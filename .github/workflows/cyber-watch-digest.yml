name: Cyber Watch — Digest email

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright (scraping best-effort)
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Send digest
        working-directory: cyber-watch
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python digest.py

      - name: Commit updated state (dédoublonnage)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cyber-watch/state.json
          if ! git diff --cached --quiet; then
            git commit -m "Update cyber-watch digest state [skip ci]"
            git push
          fi
